[defaults]
host_key_checking = False
retry_files_enabled = False
roles_path = roles
interpreter_python = /usr/bin/python3
deprecation_warnings = False

[ssh_connection]
pipelining = True
# Rover VMs are ephemeral and reuse a deterministic FQDN across recreate, so a
# new host key on the same name is expected, not an attack. accept-new would
# hard-fail on the changed key; instead don't persist/trust host keys at all for
# these throwaway hosts (matches host_key_checking = False above).
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no
