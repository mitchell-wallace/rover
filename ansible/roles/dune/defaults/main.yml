---
# The OS user Rover/Dune will run as. Set by the playbook from the SSH user.
target_user: "{{ ansible_user }}"
user_home: "/home/{{ target_user }}"

# Pinned versions for tools installed from GitHub releases (amd64 hosts).
lazydocker_version: "0.25.2"
gitui_version: "0.27.0"
zellij_version: "0.43.1"
zoxide_version: "0.9.9"
broot_version: "1.55.0"
tre_version: "0.4.0"
btm_version: "0.14.0"
dust_version: "1.2.4"
eza_version: "0.23.4"
delta_version: "0.19.2"

# Quality-of-life packages installed alongside the required toolset. fd-find
# ships its binary as `fdfind` on Debian/Ubuntu; the role symlinks it to `fd`.
base_packages:
  - git
  - zsh
  - micro
  - tmux
  - fd-find
  - curl
  - wget
  - unzip
  - jq
  - fzf
  - ripgrep
  - bat
  - htop
  - ca-certificates
  - gnupg

dune_install_url: "https://raw.githubusercontent.com/mitchell-wallace/dune/main/install.sh"
mise_install_url: "https://mise.run"
claude_code_install_url: "https://claude.ai/install.sh"
powerlevel10k_repo: "https://github.com/romkatv/powerlevel10k.git"
