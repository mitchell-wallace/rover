# Managed by Rover (Ansible). Edits may be overwritten on re-provision.
# Enable mouse support (scroll, select pane, resize).
set -g mouse on

# Colour fidelity. Operate as a 256-colour terminal internally so 256-colour
# programs inside tmux (e.g. the dune container's powerlevel10k prompt) are not
# collapsed to the nearest 8/16-colour slot, and advertise RGB so truecolour
# from inner programs passes through to the outer terminal (e.g. Ghostty)
# instead of being quantised.
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
