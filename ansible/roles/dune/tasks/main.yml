---
# All tasks are idempotent: re-running the playbook converges without churn.

- name: Wait for cloud-init to finish first-boot prep
  ansible.builtin.wait_for:
    path: /var/lib/rover-cloud-init-done
    timeout: 300
  # Non-fatal: if cloud-init used a different marker, continue anyway.
  failed_when: false

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base + quality-of-life packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present

# --- Docker Engine + Docker Sandboxes --------------------------------------
- name: Check whether Docker Sandboxes is installed
  ansible.builtin.command:
    argv:
      - dpkg-query
      - -W
      - "-f=${Status}"
      - docker-sbx
  register: docker_sbx_installed
  changed_when: false
  failed_when: false

# Docker's supported Ubuntu install path uses get.docker.com only to configure
# the apt repository; docker-sbx then pulls in the required Docker packages.
- name: Configure the Docker apt repository
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://get.docker.com | REPO_ONLY=1 sh
  args:
    executable: /bin/bash
  when: docker_sbx_installed.rc != 0 or docker_sbx_installed.stdout != 'install ok installed'
  changed_when: true

- name: Install Docker Sandboxes
  ansible.builtin.apt:
    name: docker-sbx
    state: present
    update_cache: true
  when: docker_sbx_installed.rc != 0 or docker_sbx_installed.stdout != 'install ok installed'

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add user to Docker and KVM groups
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups:
      - docker
      - kvm
    append: true

# `newgrp kvm` starts an interactive subshell, so it is not suitable in an
# Ansible run. A fresh SSH login gets both new supplementary groups without
# making this provisioning run depend on the caller logging out manually.
- name: Reset connection so Docker and KVM group membership applies
  ansible.builtin.meta: reset_connection

# --- GitHub CLI (gh) -------------------------------------------------------
- name: Add GitHub CLI GPG key
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: "0644"

- name: Add GitHub CLI apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
    filename: github-cli
    state: present

- name: Install gh
  ansible.builtin.apt:
    name: gh
    state: present
    update_cache: true

# --- lazydocker (GitHub release) -------------------------------------------
- name: Check lazydocker version
  ansible.builtin.command: /usr/local/bin/lazydocker --version
  register: lazydocker_installed
  changed_when: false
  failed_when: false

- name: Install lazydocker
  ansible.builtin.unarchive:
    src: "https://github.com/jesseduffield/lazydocker/releases/download/v{{ lazydocker_version }}/lazydocker_{{ lazydocker_version }}_Linux_{{ 'x86_64' if ansible_architecture == 'x86_64' else 'arm64' }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include:
      - lazydocker
    mode: "0755"
  when: "lazydocker_installed.rc != 0 or ('Version: ' ~ lazydocker_version) not in lazydocker_installed.stdout"

# --- gitui (GitHub release) ------------------------------------------------
- name: Install gitui
  ansible.builtin.unarchive:
    src: "https://github.com/extrawurst/gitui/releases/download/v{{ gitui_version }}/gitui-linux-{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    mode: "0755"
    creates: /usr/local/bin/gitui

# --- Quality-of-life CLI tools ---------------------------------------------
# tmux, fd-find, micro, fzf, and ripgrep come from base_packages above.

# fd-find on Debian/Ubuntu ships the binary as `fdfind`; expose it as `fd` so
# the host's muscle memory (and any `fd`-based tooling) works unchanged.
- name: Symlink fd -> fdfind (Debian names the binary fdfind)
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
  when: ansible_facts['os_family'] == 'Debian'

# zellij (release tarball contains a single `zellij` binary at the root).
- name: Install zellij
  ansible.builtin.unarchive:
    src: "https://github.com/zellij-org/zellij/releases/download/v{{ zellij_version }}/zellij-{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}-unknown-linux-musl.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include:
      - zellij
    mode: "0755"
    creates: /usr/local/bin/zellij

# zoxide (release tarball contains a single `zoxide` binary at the root).
- name: Install zoxide
  ansible.builtin.unarchive:
    src: "https://github.com/ajeetdsouza/zoxide/releases/download/v{{ zoxide_version }}/zoxide-{{ zoxide_version }}-{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}-unknown-linux-musl.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include:
      - zoxide
    mode: "0755"
    creates: /usr/local/bin/zoxide

# broot (one universal zip; the per-arch `broot` binary lives in a subdir).
- name: Check broot version
  ansible.builtin.command: /usr/local/bin/broot --version
  register: broot_installed
  changed_when: false
  failed_when: false

- name: Ensure broot staging dir exists
  ansible.builtin.file:
    path: "/tmp/broot-{{ broot_version }}"
    state: directory
    mode: "0755"
  when: broot_installed.rc != 0 or broot_version not in (broot_installed.stdout | default(''))

- name: Stage broot archive
  ansible.builtin.unarchive:
    src: "https://github.com/Canop/broot/releases/download/v{{ broot_version }}/broot_{{ broot_version }}.zip"
    dest: "/tmp/broot-{{ broot_version }}"
    remote_src: true
  when: broot_installed.rc != 0 or broot_version not in (broot_installed.stdout | default(''))

- name: Install broot binary
  ansible.builtin.copy:
    src: "/tmp/broot-{{ broot_version }}/{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}-unknown-linux-gnu/broot"
    dest: /usr/local/bin/broot
    remote_src: true
    mode: "0755"
  when: broot_installed.rc != 0 or broot_version not in (broot_installed.stdout | default(''))

# tre (tre-command). Upstream publishes an x86_64-linux prebuild only; the
# Rover VM SKUs are x86_64, so other arches are skipped with a note.
- name: Install tre (tre-command)
  ansible.builtin.unarchive:
    src: "https://github.com/dduan/tre/releases/download/v{{ tre_version }}/tre-v{{ tre_version }}-x86_64-unknown-linux-musl.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include:
      - tre
    mode: "0755"
    creates: /usr/local/bin/tre
  when: ansible_architecture == 'x86_64'

- name: tre not available for this architecture
  ansible.builtin.debug:
    msg: "tre-command has no prebuilt binary for {{ ansible_architecture }}; skipped (install via cargo if needed)."
  when: ansible_architecture != 'x86_64'

# --- btm (bottom): rust-based process/system monitor TUI -------------------
# Single `btm` binary at the archive root.
- name: Install btm (bottom)
  ansible.builtin.unarchive:
    src: "https://github.com/ClementTsang/bottom/releases/download/{{ btm_version }}/bottom_{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}-unknown-linux-gnu.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include:
      - btm
    mode: "0755"
    creates: /usr/local/bin/btm

# --- dust: du/df replacement in Rust ---------------------------------------
# Binary is nested under a versioned subdir inside the archive, so stage then
# copy (same shape as the broot install below).
- name: Ensure dust staging dir exists
  ansible.builtin.file:
    path: /tmp/dust-install
    state: directory
    mode: "0755"

- name: Stage dust archive
  ansible.builtin.unarchive:
    src: "https://github.com/bootandy/dust/releases/download/v{{ dust_version }}/dust-v{{ dust_version }}-{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}-unknown-linux-musl.tar.gz"
    dest: /tmp/dust-install
    remote_src: true
    creates: /usr/local/bin/dust
  register: dust_archive

- name: Install dust binary
  ansible.builtin.copy:
    src: "/tmp/dust-install/dust-v{{ dust_version }}-{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}-unknown-linux-musl/dust"
    dest: /usr/local/bin/dust
    remote_src: true
    mode: "0755"
  when: dust_archive.changed

# --- eza: ls replacement (formerly exa) ------------------------------------
# Single `eza` binary at the archive root (stored as `./eza`, hence the prefix
# in `include` — `eza` alone won't match the tar entry).
- name: Install eza
  ansible.builtin.unarchive:
    src: "https://github.com/eza-community/eza/releases/download/v{{ eza_version }}/eza_{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}-unknown-linux-gnu.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include:
      - ./eza
    mode: "0755"
    creates: /usr/local/bin/eza

# --- delta: git diff pager -------------------------------------------------
# Binary nested under a versioned subdir inside the archive; stage then copy.
- name: Ensure delta staging dir exists
  ansible.builtin.file:
    path: /tmp/delta-install
    state: directory
    mode: "0755"

- name: Stage delta archive
  ansible.builtin.unarchive:
    src: "https://github.com/dandavison/delta/releases/download/{{ delta_version }}/delta-{{ delta_version }}-{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}-unknown-linux-gnu.tar.gz"
    dest: /tmp/delta-install
    remote_src: true
    creates: /usr/local/bin/delta
  register: delta_archive

- name: Install delta binary
  ansible.builtin.copy:
    src: "/tmp/delta-install/delta-{{ delta_version }}-{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}-unknown-linux-gnu/delta"
    dest: /usr/local/bin/delta
    remote_src: true
    mode: "0755"
  when: delta_archive.changed

# Wire delta into git as the diff/log/show pager. Managed template; personal
# settings (user.name, user.email, ...) go in ~/.gitconfig.local, which the
# template `[include]`s and Rover never overwrites.
- name: Install managed gitconfig (delta pager)
  become_user: "{{ target_user }}"
  ansible.builtin.template:
    src: gitconfig.j2
    dest: "{{ user_home }}/.gitconfig"
    mode: "0644"

# --- Terminfo: xterm-ghostty -----------------------------------------------
# Ghostty ships its own terminfo (not in ncurses-term). When a Ghostty client
# connects over SSH it forwards TERM=xterm-ghostty; without the entry zsh can't
# emit correct cursor/erase sequences and Backspace appears to type a space.
# Install the host's entry system-wide so line editing works.
- name: Copy xterm-ghostty terminfo source to VM
  ansible.builtin.copy:
    src: terminfo/xterm-ghostty.terminfo
    dest: /tmp/xterm-ghostty.terminfo
    mode: "0644"

- name: Compile xterm-ghostty terminfo
  ansible.builtin.command: "tic -x -o /usr/share/terminfo /tmp/xterm-ghostty.terminfo"
  args:
    creates: /usr/share/terminfo/x/xterm-ghostty

# --- zsh + Powerlevel10k ---------------------------------------------------
- name: Clone Powerlevel10k
  become_user: "{{ target_user }}"
  ansible.builtin.git:
    repo: "{{ powerlevel10k_repo }}"
    dest: "{{ user_home }}/.powerlevel10k"
    depth: 1
    version: master
    update: false

- name: Install managed .zshrc
  become_user: "{{ target_user }}"
  ansible.builtin.template:
    src: zshrc.j2
    dest: "{{ user_home }}/.zshrc"
    mode: "0644"

# --- Codex: Linear MCP key store --------------------------------------------
# The key value itself is never templated here — these tasks only provision
# the root-owned scaffold and the narrow sudo grant. A human fills in the
# key content post-provision (state: touch never overwrites existing content,
# so re-running the playbook won't clobber a key that's already in place).
- name: Ensure /etc/codex directory exists (world-traversable; key file inside is root-only)
  ansible.builtin.file:
    path: /etc/codex
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure Linear MCP key file exists (root-only; content untouched if present)
  ansible.builtin.file:
    path: /etc/codex/linear.key
    state: touch
    owner: root
    group: root
    mode: "0600"

- name: Allow {{ target_user }} passwordless sudo to read the Linear MCP key
  ansible.builtin.copy:
    dest: /etc/sudoers.d/codex-linear-key
    content: "{{ target_user }} ALL=(root) NOPASSWD: /usr/bin/cat /etc/codex/linear.key\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

# --- Tool configurations (baked into the role, not read from the host) ------
- name: Ensure user config directories exist
  become_user: "{{ target_user }}"
  ansible.builtin.file:
    path: "{{ user_home }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - .config/zellij
    - .config/micro
    - .config/broot/skins

- name: Install tmux config
  become_user: "{{ target_user }}"
  ansible.builtin.copy:
    src: tmux/tmux.conf
    dest: "{{ user_home }}/.tmux.conf"
    mode: "0644"

- name: Install zellij config
  become_user: "{{ target_user }}"
  ansible.builtin.copy:
    src: zellij/config.kdl
    dest: "{{ user_home }}/.config/zellij/config.kdl"
    mode: "0644"

- name: Install micro config
  become_user: "{{ target_user }}"
  ansible.builtin.copy:
    src: micro/
    dest: "{{ user_home }}/.config/micro/"
    mode: "0644"

- name: Install broot config (conf, verbs, skins, br helper)
  become_user: "{{ target_user }}"
  ansible.builtin.copy:
    src: broot/
    dest: "{{ user_home }}/.config/broot/"
    mode: "0644"

- name: Set zsh as the default shell
  ansible.builtin.user:
    name: "{{ target_user }}"
    shell: /usr/bin/zsh

# --- Verify Docker works for the user --------------------------------------
- name: Verify Docker works for the user
  become_user: "{{ target_user }}"
  ansible.builtin.command: docker run --rm hello-world
  register: docker_hello
  changed_when: false

- name: Show Docker verification result
  ansible.builtin.debug:
    msg: "Docker verified for {{ target_user }}: {{ 'Hello from Docker' in docker_hello.stdout }}"

# --- Dune ------------------------------------------------------------------
- name: Check whether dune is already installed
  become_user: "{{ target_user }}"
  ansible.builtin.stat:
    path: "{{ user_home }}/.local/bin/dune"
  register: dune_check

- name: Install dune
  become_user: "{{ target_user }}"
  ansible.builtin.shell: "curl -fsSL {{ dune_install_url }} | bash"
  args:
    executable: /bin/bash
  when: not dune_check.stat.exists
  changed_when: true

# --- mise ------------------------------------------------------------------
- name: Check whether mise is already installed
  become_user: "{{ target_user }}"
  ansible.builtin.stat:
    path: "{{ user_home }}/.local/bin/mise"
  register: mise_check

- name: Install mise
  become_user: "{{ target_user }}"
  ansible.builtin.shell: "curl -fsSL {{ mise_install_url }} | sh"
  args:
    executable: /bin/sh
  when: not mise_check.stat.exists
  changed_when: true

# --- Claude Code ------------------------------------------------------------
- name: Check whether Claude Code is already installed
  become_user: "{{ target_user }}"
  ansible.builtin.stat:
    path: "{{ user_home }}/.local/bin/claude"
  register: claude_code_check

# The native installer is Anthropic's recommended non-interactive install path.
# Native installs update themselves in the background after first installation.
- name: Install Claude Code
  become_user: "{{ target_user }}"
  ansible.builtin.shell: "curl -fsSL {{ claude_code_install_url }} | bash"
  args:
    executable: /bin/bash
  when: not claude_code_check.stat.exists
  changed_when: true

# --- thenn (task scheduler) -------------------------------------------------
- name: Resolve the latest thenn release
  ansible.builtin.uri:
    url: https://api.github.com/repos/mitchell-wallace/thenn/releases/latest
    return_content: true
  register: thenn_latest_release
  changed_when: false

- name: Record the latest thenn version
  ansible.builtin.set_fact:
    thenn_latest_version: "{{ thenn_latest_release.json.tag_name | regex_replace('^v', '') }}"

- name: Check installed thenn version
  become_user: "{{ target_user }}"
  ansible.builtin.command: "{{ user_home }}/.local/bin/thenn --version"
  register: thenn_installed
  changed_when: false
  failed_when: false

- name: Ensure user-local binary directory exists
  become_user: "{{ target_user }}"
  ansible.builtin.file:
    path: "{{ user_home }}/.local/bin"
    state: directory
    mode: "0755"

- name: Install latest thenn release
  become_user: "{{ target_user }}"
  ansible.builtin.unarchive:
    src: "https://github.com/mitchell-wallace/thenn/releases/download/v{{ thenn_latest_version }}/thenn_{{ thenn_latest_version }}_linux_{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}.tar.gz"
    dest: "{{ user_home }}/.local/bin"
    remote_src: true
    include:
      - thenn
    mode: "0755"
  when: thenn_installed.rc != 0 or (thenn_installed.stdout | trim) != thenn_latest_version

# --- rover-halt (self-deallocate) -------------------------------------------
- name: Install rover-halt
  ansible.builtin.copy:
    src: rover-halt
    dest: /usr/local/bin/rover-halt
    mode: "0755"
