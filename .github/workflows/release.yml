name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: rover

      # go.mod has a local `replace .../chassis => ../chassis` (chassis has
      # no tagged release yet); check it out as a true sibling so it resolves.
      - uses: actions/checkout@v6
        with:
          repository: mitchell-wallace/chassis
          path: chassis

      - name: Check if release already exists
        id: check
        working-directory: rover
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" --json tagName --jq .tagName > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        if: steps.check.outputs.exists != 'true'
        with:
          go-version-file: rover/go.mod

      - uses: goreleaser/goreleaser-action@v7
        if: steps.check.outputs.exists != 'true'
        with:
          distribution: goreleaser
          version: "~> v2"
          workdir: rover
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
