name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: extractions/setup-just@v2
      - run: just build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: extractions/setup-just@v2
      - run: just test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # All Azure scripts (extensionless ones carry shebangs) plus install.sh.
          # Exclude test_common.sh which is not a standalone script (sources common.sh).
          shellcheck scripts/azure/up scripts/azure/down scripts/azure/status scripts/azure/ip scripts/azure/ssh scripts/azure/ssh-access scripts/azure/disk scripts/azure/common.sh ansible/roles/dune/files/rover-halt install.sh

  bash-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bash unit tests for Azure script helpers
        run: bash scripts/azure/test_common.sh
