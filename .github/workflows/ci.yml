name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: rover
      # go.mod has a local `replace .../chassis => ../chassis` (chassis has
      # no tagged release yet); check it out as a true sibling so it resolves.
      - uses: actions/checkout@v6
        with:
          repository: mitchell-wallace/chassis
          path: chassis
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - uses: extractions/setup-just@v2
      - run: just build
        working-directory: rover

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: rover
      - uses: actions/checkout@v6
        with:
          repository: mitchell-wallace/chassis
          path: chassis
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - uses: extractions/setup-just@v2
      - run: just test
        working-directory: rover

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: rover
      - uses: actions/checkout@v6
        with:
          repository: mitchell-wallace/chassis
          path: chassis
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: rover

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # All Azure scripts (extensionless ones carry shebangs) plus install.sh.
          # Exclude test_common.sh which is not a standalone script (sources common.sh).
          shellcheck scripts/azure/up scripts/azure/down scripts/azure/status scripts/azure/ip scripts/azure/ssh scripts/azure/ssh-access scripts/azure/disk scripts/azure/restart scripts/azure/common.sh ansible/roles/dune/files/rover-halt install.sh

  bash-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run bash unit tests for Azure script helpers
        run: bash scripts/azure/test_common.sh
